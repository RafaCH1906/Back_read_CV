AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CV Ranker - Infraestructura serverless basada en eventos para AWS Academy Learner Lab.
  Flujo: POST /jobs (presigned URLs) -> upload a S3 -> evento S3 -> SQS -> Worker Lambda -> DynamoDB -> GET /jobs/{id}/results
  NO crea recursos IAM. Usa LabRole como execution role en todas las Lambdas.
  Los archivos de código se cargan mediante ZIPs empaquetados en un bucket S3 de despliegue.

Parameters:
  DeploymentBucket:
    Type: String
    Description: Nombre del bucket S3 donde están alojados los ZIPs de despliegue de las Lambdas (ej. deploystack-bucket).
  GroqApiKey:
    Type: String
    NoEcho: true
    Description: API Key para acceder a Groq. Se inyecta de forma segura al Worker Lambda.

Resources:

  # ---------- ALMACENAMIENTO ----------

  UploadsBucket:
    Type: AWS::S3::Bucket
    DependsOn: CvQueuePolicy
    Properties:
      BucketName: !Sub 'cv-uploads-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT, POST, GET]
            AllowedOrigins: ['*']
            ExposedHeaders: [ETag]
      NotificationConfiguration:
        QueueConfigurations:
          - Event: 's3:ObjectCreated:*'
            Queue: !GetAtt CvQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'jobs/'

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cv-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::cv-frontend-${AWS::AccountId}/*'

  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cv-ranker-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  # ---------- COLAS (resiliencia / reintentos) ----------

  CvDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cv-ranker-dlq
      MessageRetentionPeriod: 1209600  # 14 dias

  CvQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cv-ranker-queue
      VisibilityTimeout: 90           # Mayor al timeout del worker para reintentar rapido (90s)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CvDLQ.Arn
        maxReceiveCount: 3            # tras 3 fallos -> DLQ

  # Permite que S3 (de esta cuenta y este bucket) escriba en la cola
  CvQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref CvQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: 'sqs:SendMessage'
            Resource: !GetAtt CvQueue.Arn
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:s3:::cv-uploads-${AWS::AccountId}'
              StringEquals:
                'aws:SourceAccount': !Ref AWS::AccountId

  # ---------- LAMBDAS (todas con LabRole) ----------

  CreateJobFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cv-create-job
      Runtime: python3.12
      Handler: functions.create_job.handler.handler
      Timeout: 30
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/LabRole'
      Environment:
        Variables:
          TABLE: !Ref ResultsTable
          UPLOAD_BUCKET_NAME: !Sub 'cv-uploads-${AWS::AccountId}'
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: create_job.zip

  GetResultsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cv-get-results
      Runtime: python3.12
      Handler: functions.get_results.handler.handler
      Timeout: 30
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/LabRole'
      Environment:
        Variables:
          TABLE: !Ref ResultsTable
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: get_results.zip



  WorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cv-worker
      Runtime: python3.12
      Handler: functions.worker.handler.handler
      Timeout: 60
      ReservedConcurrentExecutions: 2
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/LabRole'
      Environment:
        Variables:
          TABLE: !Ref ResultsTable
          GROQ_API_KEY: !Ref GroqApiKey
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: worker.zip

  WorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt CvQueue.Arn
      FunctionName: !Ref WorkerFunction
      BatchSize: 1
      Enabled: true

  # ---------- API (HTTP API v2, CORS integrado) ----------

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: cv-ranker-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: ['*']
        AllowHeaders: ['*']

  CreateJobIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CreateJobFunction.Arn
      PayloadFormatVersion: '2.0'

  GetResultsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GetResultsFunction.Arn
      PayloadFormatVersion: '2.0'

  CreateJobRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /jobs'
      Target: !Sub 'integrations/${CreateJobIntegration}'

  GetResultsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /jobs/{id}/results'
      Target: !Sub 'integrations/${GetResultsIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  CreateJobPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateJobFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  GetResultsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetResultsFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

# ---------- SALIDAS ----------
Outputs:
  ApiEndpoint:
    Description: Base URL de la API (POST /jobs , GET /jobs/{id}/results)
    Value: !GetAtt HttpApi.ApiEndpoint
  UploadsBucket:
    Description: Bucket donde se suben los CVs (presigned)
    Value: !Ref UploadsBucket
  FrontendBucket:
    Description: Bucket para el build del frontend
    Value: !Ref FrontendBucket
  FrontendWebsiteURL:
    Description: URL publica del frontend
    Value: !Sub 'http://cv-frontend-${AWS::AccountId}.s3-website-${AWS::Region}.amazonaws.com'
  QueueUrl:
    Description: URL de la cola SQS
    Value: !Ref CvQueue
  DLQUrl:
    Description: URL de la Dead Letter Queue
    Value: !Ref CvDLQ
  TableName:
    Description: Tabla DynamoDB de resultados
    Value: !Ref ResultsTable
